<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Transfer — Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #fcfcfd;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle organic background shape */
        .bg-shape {
            position: fixed;
            top: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        .bg-shape-2 {
            position: fixed;
            bottom: -10%;
            left: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.04) 0%, transparent 70%);
            z-index: -1;
        }

        /* Soft Minimalist Card */
        .modern-card {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.02), 0 10px 10px -5px rgba(0, 0, 0, 0.01);
            border-radius: 32px;
        }

        /* Interaction states */
        .btn-action {
            background: #1a1a1a;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-action:hover {
            background: #334155;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .btn-action:active {
            transform: translateY(0);
        }

        .file-box {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            transition: border-color 0.2s ease;
        }

        .file-box:hover {
            border-color: #e2e8f0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-reveal {
            animation: fadeIn 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="bg-shape"></div>
    <div class="bg-shape-2"></div>

    <main class="w-full max-w-md animate-reveal">
        <div class="modern-card p-10">
            <!-- Header -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-slate-50 rounded-2xl mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Download Archive</h1>
                <p class="text-slate-500 mt-2 text-sm">Securely fetch the requested manifest.</p>
            </div>

            <!-- Content -->
            <div class="space-y-8">
                <div class="file-box p-5 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <div>
                            <p class="text-[11px] font-medium text-slate-400 uppercase tracking-wider">File Name</p>
                            <p class="text-sm font-medium text-slate-700">chat.txt</p>
                        </div>
                    </div>
                    <span class="text-[10px] font-bold text-slate-400 border border-slate-200 px-2 py-0.5 rounded-md uppercase">Text</span>
                </div>

                <!-- Status Feedback -->
                <div id="statusMessage" class="hidden transform transition-all duration-300"></div>

                <button 
                    onclick="downloadFile()" 
                    id="downloadBtn"
                    class="btn-action w-full py-4 rounded-2xl text-white font-medium text-sm flex items-center justify-center space-x-2"
                >
                    <span>Download File</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </div>

            <!-- Footer -->
            <div class="mt-10 pt-8 border-t border-slate-100 flex items-center justify-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-slate-300" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                </svg>
                <span class="text-[11px] text-slate-400 font-medium uppercase tracking-widest">Encrypted Fetch</span>
            </div>
        </div>
        
        <p class="mt-8 text-center text-slate-400 text-xs font-normal">
            Sourced via GitHub API protocol.
        </p>
    </main>

    <script>
        async function downloadFile() {
            const btn = document.getElementById('downloadBtn');
            const status = document.getElementById('statusMessage');
            
            const fileUrl = 'https://raw.githubusercontent.com/Renoo-AI/whatsappviewermessages/main/chat.txt'; 
            const fileName = 'chat.txt';

            try {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.innerHTML = `
                    <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Fetching...</span>
                `;

                const response = await fetch(fileUrl);
                
                if (!response.ok) throw new Error('CORS or Network Error');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = fileName;
                
                document.body.appendChild(a);
                a.click();
                
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                status.innerHTML = `
                    <div class="bg-slate-50 border border-slate-100 text-slate-600 px-4 py-3 rounded-xl flex items-center space-x-3">
                        <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        <span class="text-xs font-medium">Download initialized.</span>
                    </div>
                `;
                status.classList.remove('hidden');

            } catch (error) {
                status.innerHTML = `
                    <div class="bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl flex items-center space-x-3">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span class="text-xs font-medium">Network error. Repository might be private.</span>
                    </div>
                `;
                status.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.innerHTML = `
                    <span>Download File</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                `;
            }
        }
    </script>
</body>
</html>
